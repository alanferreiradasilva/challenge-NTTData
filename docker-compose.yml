services:
  api:
    build:
      context: src
      dockerfile: Challenge.API/Dockerfile
    container_name: challenge-api
    ports:
      - "5217:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Data Source=/tmp/challenge.db
      - Jwt__Secret=aK9mP4xR7vB2nL5qW8yC1hJ3fT6uE0iG
      - Jwt__Issuer=ChallengeAPI
      - Jwt__Audience=ChallengeClient
      - Jwt__ExpirationInMinutes=60
    restart: unless-stopped

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    restart: unless-stopped

volumes:
  sonarqube_data:
